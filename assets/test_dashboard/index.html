<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>__TITLE__</title>
  <style>
    :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #101418; color: #f7f7f2; }
    main { max-width: 1240px; margin: 0 auto; padding: 18px; }
    header { display: flex; gap: 14px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    h1 { margin: 0; font-size: clamp(24px, 5vw, 46px); letter-spacing: 0; }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; }
    button { border: 0; border-radius: 8px; padding: 11px 14px; font-weight: 800; color: #101418; background: #bdf7df; cursor: pointer; }
    button.secondary { background: #ffd3df; }
    button.neutral { background: #e8e0ff; }
    .grid { display: grid; grid-template-columns: minmax(0, 1.6fr) minmax(300px, .9fr); gap: 14px; margin-top: 16px; }
    .panel { border: 1px solid #2b343d; border-radius: 8px; background: #171d23; overflow: hidden; }
    .panel h2 { margin: 0; padding: 12px 14px; font-size: 15px; border-bottom: 1px solid #2b343d; }
    .video-wrap { background: #050607; aspect-ratio: 16 / 9; display: grid; place-items: center; }
    img { width: 100%; height: 100%; object-fit: contain; }
    audio { width: calc(100% - 24px); margin: 12px; }
    pre { margin: 0; padding: 12px; min-height: 170px; white-space: pre-wrap; word-break: break-word; font-size: 12px; line-height: 1.35; color: #cde7ff; }
    .status { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 10px; margin-top: 14px; }
    .tile { border: 1px solid #2b343d; border-radius: 8px; padding: 12px; background: #171d23; }
    .label { color: #90a0ad; font-size: 12px; }
    .value { font-size: 18px; font-weight: 900; margin-top: 4px; overflow-wrap: anywhere; }
    @media (max-width: 820px) { .grid, .status { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<main>
  <header>
    <div>
      <h1>MimiCam Test</h1>
      <div class="label">Video, ses ve bildirim kanalını tarayıcıdan ayrı ayrı ölç.</div>
    </div>
    <div class="toolbar">
      <button id="start">Canlı testi başlat</button>
      <button id="tone" class="neutral">Test tonu çal</button>
      <button id="alert" class="secondary">Bildirim gönder</button>
      <button id="probe" class="neutral">Probe çalıştır</button>
      <button id="health" class="secondary">Tam sağlık testi</button>
    </div>
  </header>
  <section class="status">
    <div class="tile"><div class="label">Pair</div><div id="pairState" class="value">bekliyor</div></div>
    <div class="tile"><div class="label">Video</div><div id="videoState" class="value">kapalı</div></div>
    <div class="tile"><div class="label">Ses</div><div id="audioState" class="value">kapalı</div></div>
    <div class="tile"><div class="label">Event WS</div><div id="wsState" class="value">kapalı</div></div>
    <div class="tile"><div class="label">Full Test</div><div id="fullState" class="value">bekliyor</div></div>
  </section>
  <section class="grid">
    <div class="panel">
      <h2>Canlı video</h2>
      <div class="video-wrap"><img id="video" alt="MimiCam MJPEG stream"></div>
      <audio id="audio" controls playsinline></audio>
    </div>
    <div class="panel">
      <h2>Log</h2>
      <pre id="log"></pre>
    </div>
    <div class="panel">
      <h2>/test/status</h2>
      <pre id="diag"></pre>
    </div>
    <div class="panel">
      <h2>Son event</h2>
      <pre id="event"></pre>
    </div>
    <div class="panel">
      <h2>Sağlık raporu</h2>
      <pre id="healthReport"></pre>
    </div>
  </section>
  <canvas id="videoProbeCanvas" width="160" height="90" hidden></canvas>
</main>
<script src="/test/dashboard.js"></script>
</body>
</html>
